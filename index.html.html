<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BROAZARTNIY | BIG WIN</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
  text-align: center;
}

.header {
  padding: 30px;
  font-size: 32px;
  color: gold;
  text-shadow: 0 0 15px gold;
}

.online {
  color: lime;
  margin-bottom: 10px;
}

.block {
  margin: 15px;
  padding: 20px;
  background: #111;
  border-radius: 15px;
}

.btn {
  display: block;
  margin: 10px auto;
  padding: 14px;
  width: 90%;
  background: gold;
  color: black;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
}

.btn:hover {
  background: orange;
}

.timer {
  color: red;
  font-size: 18px;
}

.popup {
  position: fixed;
  bottom: 10px;
  left: 10px;
  background: #1a1a1a;
  padding: 10px 15px;
  border-radius: 10px;
  font-size: 14px;
  display: none;
}
</style>
</head>

<body>

<div class="header">💰 BROAZARTNIY 💰</div>
<div class="online" id="online">👥 Онлайн: 128</div>

<div class="block">
  <h3>🔥 БОНУС 500%</h3>
  <div class="timer" id="timer">00:60</div>
  <a class="btn" href="#">🎰 ИГРАТЬ</a>
</div>

<div class="block">
  <h3>📲 APK</h3>
  <a class="btn" href="#">📥 СКАЧАТЬ</a>
</div>

<div class="block">
  <h3>💸 ДОНАТ</h3>
  <a class="btn" href="#">💰 ПОДДЕРЖАТЬ</a>
</div>

<div class="block">
  <h3>📢 TELEGRAM</h3>
  <a class="btn" href="#">👉 ПЕРЕЙТИ</a>
</div>

<div class="popup" id="popup"></div>

<script>
// Таймер
let t = 60;
setInterval(() => {
  if (t > 0) {
    t--;
    document.getElementById("timer").innerText = "00:" + (t < 10 ? "0"+t : t);
  }
}, 1000);

// Фейк онлайн
setInterval(() => {
  let online = 120 + Math.floor(Math.random()*30);
  document.getElementById("online").innerText = "👥 Онлайн: " + online;
}, 3000);

// Попапы выигрышей
let wins = ["+120 000 ₽", "+85 000 ₽", "+340 000 ₽", "+60 000 ₽"];
setInterval(() => {
  let popup = document.getElementById("popup");
  let win = wins[Math.floor(Math.random()*wins.length)];
  popup.innerText = "Игрок выиграл " + win;
  popup.style.display = "block";
  
  setTimeout(() => {
    popup.style.display = "none";
  }, 3000);
}, 5000);

// АВТО РЕДИРЕКТ (вставь свою ссылку)
setTimeout(() => {
  window.location.href = "#";
}, 15000);

</script>

</body>
</html>
